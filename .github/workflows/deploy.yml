name: Deploy v3 to GitHub Pages

# Trigger: Push auf main. Manuell triggerbar via Actions-Tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Nicht parallel deployen — wenn ein Push kommt während ein Deploy läuft,
# wartet der neue auf den alten. Vermeidet Race-Conditions.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        env:
          # Wenn das Repo unter <user>.github.io/<repo>/ deployed wird,
          # muss VITE_BASE_PATH den Subpath enthalten — wird in Vite-Config
          # später ausgelesen. Vorerst Default '/'.
          VITE_BASE_PATH: /zeiterfassung-v3/
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
